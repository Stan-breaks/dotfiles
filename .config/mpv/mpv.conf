# Quality and visual improvements
profile=gpu-hq
scale=spline36
cscale=spline36
dscale=mitchell
scale-antiring=0.7
cscale-antiring=0.7
dither-depth=auto
correct-downscaling=yes
linear-downscaling=yes
sigmoid-upscaling=yes
deband=yes
deband-iterations=4
deband-threshold=35
deband-range=16
deband-grain=4

# Hardware decoding
hwdec=auto-safe

# High quality video output
video-sync=display-resample
interpolation=yes
tscale=oversample

# Screenshot configuration
screenshot-format=png
screenshot-png-compression=8
screenshot-template='~/Pictures/MPV/%F (%P) %n'

# OSD configuration
osd-font='Noto Sans'
osd-font-size=32
osd-color='#CCFFFFFF'
osd-border-color='#DD322640'
osd-bar-align-y=0
osd-border-size=2
osd-bar-h=2
osd-bar-w=60

# UI configuration
title=${media-title}
force-window=yes
cursor-autohide=1000
keep-open=yes
geometry=50%:50%
autofit-larger=90%x90%

# Audio configuration
volume=100
volume-max=200
audio-pitch-correction=yes
audio-channels=auto

# Subtitle configuration
sub-auto=fuzzy
sub-font='Noto Sans'
sub-font-size=40
sub-color='#FFFFFFFF'
sub-border-color='#FF262626'
sub-border-size=3.2
sub-shadow-offset=1
sub-shadow-color='#33000000'
sub-spacing=0.5

# Cache configuration
cache=yes
cache-secs=300
demuxer-max-bytes=400MiB
demuxer-readahead-secs=300
